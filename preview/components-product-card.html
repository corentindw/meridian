<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Product card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: var(--color-neutral-100); padding: 24px; box-sizing: border-box; width: 700px; font-family: var(--font-family-text); color: var(--color-neutral-950); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.card {
  background: #fff;
  border-radius: var(--radius-none);
  box-shadow: var(--elevation-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Image zone ── */
.ph {
  aspect-ratio: 3/3.2;
  position: relative;
  overflow: hidden;
  /* Checkered placeholder */
  background-color: #e8e8e8;
  background-image:
    linear-gradient(45deg, #d8d8d8 25%, transparent 25%),
    linear-gradient(-45deg, #d8d8d8 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #d8d8d8 75%),
    linear-gradient(-45deg, transparent 75%, #d8d8d8 75%);
  background-size: 32px 32px;
  background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
}

/* ── Flags on image ── */
.flag-img {
  position: absolute;
  font-family: var(--font-family-utility);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  line-height: var(--line-height-flag);
  padding: 4px 8px;
  border-radius: var(--radius-flag);
  z-index: 1;
}
.flag-tl { top: 10px; left: 10px; background: var(--color-red-800); color: var(--color-neutral-0); }
.flag-tr { top: 10px; right: 10px; background: var(--color-neutral-0); color: var(--color-neutral-950); border: 1px solid var(--color-neutral-950); }

/* ── Body ── */
.body { padding: 14px 16px 16px; }

/* Title row */
.title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 2px; }
.title {
  font-family: var(--font-family-product);
  font-weight: var(--font-weight-strong);
  font-size: var(--font-size-lg);
  letter-spacing: var(--letter-spacing-caps);
  text-transform: uppercase;
}
.stock {
  display: flex; align-items: center; gap: 4px;
  font-size: var(--font-size-sm);
  color: var(--color-green-900);
  white-space: nowrap;
}
.stock-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-green-900); flex-shrink: 0; }

.sub { font-size: var(--font-size-sm); color: var(--color-neutral-600); margin-bottom: 6px; }

/* Prices */
.prices { display: flex; align-items: baseline; gap: 8px; justify-content: flex-end; margin-bottom: 10px; }
.price-current { font-weight: var(--font-weight-strong); font-size: var(--font-size-lg); color: var(--color-red-800); }
.price-current.normal { color: var(--color-neutral-950); }
.price-old { font-size: var(--font-size-sm); color: var(--color-neutral-400); text-decoration: line-through; }

/* Swatches */
.swatches { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
.swatch { width: 20px; height: 20px; border-radius: var(--radius-none); border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }
.swatch.active { box-shadow: 0 0 0 2px var(--color-neutral-950); }
.more { font-size: var(--font-size-xs); color: var(--color-neutral-550); }

/* Bottom row */
.bottom-row { display: flex; align-items: center; gap: 8px; }
.flag-bottom {
  font-family: var(--font-family-utility);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  line-height: var(--line-height-flag);
  padding: 4px 8px;
  border-radius: var(--radius-flag);
  background: var(--color-red-200);
  color: var(--color-red-800);
}
/* Stars */
.stars { display: flex; align-items: center; gap: 2px; }
.star { width: 16px; height: 16px; color: var(--color-neutral-300); }
.star.filled { color: var(--color-neutral-950); }
.rating-count { font-size: var(--font-size-xs); color: var(--color-neutral-550); margin-left: 2px; }
</style></head><body>
<div class="grid">

  <!-- Card 1 — promo, en stock -->
  <div class="card">
    <div class="ph">
      <span class="flag-img flag-tl">-10%</span>
      <span class="flag-img flag-tr">Nouveau</span>
    </div>
    <div class="body">
      <div class="title-row">
        <div class="title">NIHAD</div>
        <div class="stock"><span class="stock-dot"></span> En stock</div>
      </div>
      <div class="sub">Canapé d'angle réversible</div>
      <div class="prices">
        <span class="price-current">1 099 €</span>
        <span class="price-old">1 199 €</span>
      </div>
      <div class="swatches">
        <div class="swatch active" style="background:#e8ddd0;"></div>
        <div class="swatch" style="background:#9c9590;"></div>
        <div class="swatch" style="background:#1a1a1a;"></div>
        <div class="swatch" style="background:#8b4c42;"></div>
        <div class="swatch" style="background:#2d4a6b;"></div>
        <div class="swatch" style="background:#5a6b4a;"></div>
        <span class="more">+0</span>
      </div>
      <div class="bottom-row">
        <span class="flag-bottom">Soldes</span>
        <div class="stars">
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <span class="rating-count">(00)</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Card 2 — plein prix, pas de stock -->
  <div class="card">
    <div class="ph">
      <span class="flag-img flag-tl">Nouveau</span>
      <span class="flag-img flag-tr">Avant-première</span>
    </div>
    <div class="body">
      <div class="title-row">
        <div class="title">JUNO</div>
        <div class="stock"><span class="stock-dot"></span> En stock</div>
      </div>
      <div class="sub">Fauteuil velours côtelé</div>
      <div class="prices">
        <span class="price-current normal">489 €</span>
        <span class="price-old">0 000 €</span>
      </div>
      <div class="swatches">
        <div class="swatch active" style="background:#e8ddd0;"></div>
        <div class="swatch" style="background:#9c9590;"></div>
        <div class="swatch" style="background:#1a1a1a;"></div>
        <div class="swatch" style="background:#8b4c42;"></div>
        <div class="swatch" style="background:#2d4a6b;"></div>
        <div class="swatch" style="background:#5a6b4a;"></div>
        <span class="more">+0</span>
      </div>
      <div class="bottom-row">
        <span class="flag-bottom">flag</span>
        <div class="stars">
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 4.5L14.472 9.528L20 10.361L16 14.25L16.944 19.75L12 17.153L7.056 19.75L8 14.25L4 10.361L9.528 9.528L12 4.5Z"/></svg>
          <span class="rating-count">(00)</span>
        </div>
      </div>
    </div>
  </div>

</div>
</body></html>
