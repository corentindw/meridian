<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body {
  margin: 0; background: #fff;
  padding: 18px 22px 20px;
  box-sizing: border-box;
  width: 700px;
  font-family: var(--font-family-text);
  color: var(--color-neutral-950);
}

/* ── Grid : rows = states, cols = types ── */
.matrix {
  display: grid;
  grid-template-columns: 56px repeat(4, 1fr);
  row-gap: 0;
  column-gap: 0;
}

.state-lbl {
  font-family: var(--font-family-code);
  font-size: 10px;
  color: var(--color-neutral-550);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  padding-right: 8px;
}
.col-head {
  font-family: var(--font-family-code);
  font-size: 10px;
  color: var(--color-neutral-550);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding-bottom: 10px;
  text-align: center;
}
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
}

/* ── Button primitive ── */
.btn {
  font-family: var(--font-family-utility);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-md);
  line-height: var(--line-height-md);
  letter-spacing: var(--letter-spacing-default);
  border-radius: var(--radius-button);
  height: 40px;
  padding: 0 16px;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  box-sizing: border-box;
  white-space: nowrap;
  width: 100%;
  justify-content: center;
}
.arr {
  width: 24px; height: 24px;
  flex-shrink: 0;
}

/* ── Primary ── */
.primary         { background: var(--color-neutral-950); color: var(--color-neutral-0); }
.primary.hover   { background: var(--color-neutral-800); color: var(--color-neutral-0); }
.primary.focus   { background: var(--color-neutral-700); color: var(--color-neutral-0); }
.primary.disabled{ background: var(--color-neutral-200); color: var(--color-neutral-400); cursor: not-allowed; }

/* ── White ── */
.white         { background: var(--color-neutral-0);   color: var(--color-neutral-950); border-color: transparent; }
.white.hover   { background: var(--color-neutral-100); color: var(--color-neutral-950); }
.white.focus   { background: var(--color-neutral-150); color: var(--color-neutral-950); }
.white.disabled{ background: transparent; color: var(--color-neutral-350); cursor: not-allowed; }

/* ── Secondary ── */
.secondary         { background: var(--color-neutral-100); color: var(--color-neutral-950); }
.secondary.hover   { background: var(--color-neutral-150); color: var(--color-neutral-950); }
.secondary.focus   { background: var(--color-neutral-200); color: var(--color-neutral-950); }
.secondary.disabled{ background: var(--color-neutral-100); color: var(--color-neutral-350); cursor: not-allowed; }

/* ── Outline ── */
.outline         { background: #fff; color: var(--color-foreground-neutral-10); border-color: var(--color-border-neutral-5); }
.outline.hover   { background: #fff; color: var(--color-foreground-neutral-10); border-color: var(--color-border-neutral-7); }
.outline.focus   { background: #fff; color: var(--color-foreground-neutral-10); border-color: var(--color-border-neutral-10); }
.outline.disabled{ background: #fff; color: var(--color-foreground-neutral-4);  border-color: var(--color-border-neutral-4); cursor: not-allowed; }
</style></head><body>
