<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Font families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; padding: 22px 28px; box-sizing: border-box; width: 700px; color: var(--color-neutral-950); }
.fam { display: flex; align-items: baseline; gap: 20px; padding: 10px 0; border-bottom: 1px solid var(--color-neutral-150); }
.fam:last-child { border: 0; }
.lbl { font-family: var(--font-family-code); font-size: 10px; color: var(--color-neutral-550); width: 160px; line-height: 1.3; }
.sans { font-family: var(--font-family-text); font-weight: 800; font-size: 38px; line-height: 1; }
.mono { font-family: var(--font-family-code); font-weight: 700; font-size: 22px; }
.weights { display: flex; gap: 18px; font-family: var(--font-family-text); font-size: 14px; color: var(--color-neutral-800); margin-top: 8px; }
</style></head><body>
<div class="fam">
  <div class="lbl">Hanken Grotesk<br/>text / heading / display · uploaded</div>
  <div>
    <div class="sans">Bobochic Paris</div>
    <div class="weights">
      <span style="font-weight: 400;">400 Regular</span>
      <span style="font-weight: 600;">600 SemiBold</span>
      <span style="font-weight: 700;">700 Bold</span>
      <span style="font-weight: 800;">800 ExtraBold</span>
      <span style="font-weight: 900;">900 Black</span>
    </div>
  </div>
</div>
<div class="fam">
  <div class="lbl">Space Mono<br/>utility-code · Google Fonts</div>
  <div class="mono">$color-neutral-950</div>
</div>
</body></html>
