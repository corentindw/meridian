<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Font families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; padding: 22px 28px; box-sizing: border-box; width: 700px; color: var(--color-neutral-950); }
.fam { padding: 10px 0; }
.lbl { font-family: var(--font-family-text); font-size: 10px; color: var(--color-neutral-550); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
.specimen { font-family: var(--font-family-text); font-size: 42px; font-weight: 800; line-height: 1; margin-bottom: 10px; }
.weights { display: flex; gap: 20px; font-family: var(--font-family-text); font-size: 14px; color: var(--color-neutral-800); }
.divider { height: 1px; background: var(--color-neutral-150); margin: 10px 0; }
.roles { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.role {
  font-family: var(--font-family-text);
  font-size: 11px;
  color: var(--color-neutral-550);
  background: var(--color-neutral-100);
  padding: 2px 8px;
}
</style></head><body>
<div class="fam">
  <div class="lbl">Hanken Grotesk · Variable · uploaded</div>
  <div class="specimen">Bobochic Paris</div>
  <div class="weights">
    <span style="font-weight: 400;">400 Regular</span>
    <span style="font-weight: 600;">600 SemiBold</span>
    <span style="font-weight: 700;">700 Bold</span>
    <span style="font-weight: 800;">800 ExtraBold</span>
    <span style="font-weight: 900;">900 Black</span>
  </div>
  <div class="roles">
    <span class="role">--font-family-text</span>
    <span class="role">--font-family-heading</span>
    <span class="role">--font-family-display</span>
    <span class="role">--font-family-subtitle</span>
    <span class="role">--font-family-utility</span>
    <span class="role">--font-family-product</span>
    <span class="role">--font-family-code</span>
  </div>
</div>
</body></html>
