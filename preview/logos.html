<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; font-family: var(--font-sans); }
.wrap { width: 700px; height: 150px; padding: 0; display: flex; align-items: stretch; }
.panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; }
.panel.dark { background: var(--neutral-900); }
.panel.light { background: var(--neutral-0); border-right: 1px solid var(--neutral-200); }
.panel.grey { background: var(--neutral-100); border-right: 1px solid var(--neutral-200); }
.panel img { max-height: 38px; width: auto; display: block; }
.panel .xs { max-height: 48px; }
</style></head><body>
<div class="wrap">
  <div class="panel light"><img src="../assets/logo-bobochic-paris-dark.svg" alt=""></div>
  <div class="panel grey"><img src="../assets/logo-bobochic-dark.svg" alt=""></div>
  <div class="panel light"><img class="xs" src="../assets/logo-bobochic-xs-dark.svg" alt=""></div>
  <div class="panel dark"><img src="../assets/logo-bobochic-paris-light.svg" alt=""></div>
</div>
</body></html>
