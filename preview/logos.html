<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; padding: 18px 22px 20px; box-sizing: border-box; width: 700px; font-family: var(--font-family-text); }
.row { display: flex; gap: 0; border: 1px solid var(--color-neutral-150); margin-bottom: 14px; }
.row:last-child { margin-bottom: 0; }
.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 24px 16px;
  border-right: 1px solid var(--color-neutral-150);
}
.panel:last-child { border-right: none; }
.panel.dark { background: var(--color-neutral-950); }
.panel img { max-height: 40px; width: auto; max-width: 100%; display: block; }
.panel img.monogram { max-height: 48px; }
.lbl {
  font-family: var(--font-family-code);
  font-size: 9px;
  color: var(--color-neutral-450);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.lbl.light { color: rgba(255,255,255,0.4); }
</style></head><body>

<!-- Fond clair -->
<div class="row">
  <div class="panel">
    <img src="../assets/logo-bobochicparis.svg" alt="Bobochic Paris">
    <div class="lbl">logo-bobochicparis</div>
  </div>
  <div class="panel">
    <img src="../assets/logo-bobochic.svg" alt="Bobochic">
    <div class="lbl">logo-bobochic</div>
  </div>
  <div class="panel">
    <img src="../assets/logo-b.svg" alt="B" class="monogram">
    <div class="lbl">logo-b</div>
  </div>
</div>

<!-- Fond sombre -->
<div class="row">
  <div class="panel dark">
    <img src="../assets/logo-bobochicparis.svg" alt="Bobochic Paris" style="filter: invert(1);">
    <div class="lbl light">logo-bobochicparis</div>
  </div>
  <div class="panel dark">
    <img src="../assets/logo-bobochic.svg" alt="Bobochic" style="filter: invert(1);">
    <div class="lbl light">logo-bobochic</div>
  </div>
  <div class="panel dark">
    <img src="../assets/logo-b.svg" alt="B" class="monogram" style="filter: invert(1);">
    <div class="lbl light">logo-b</div>
  </div>
</div>

</body></html>
