<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: var(--color-neutral-50); padding: 24px; box-sizing: border-box; width: 700px; color: var(--color-neutral-950); font-family: var(--font-family-text); }
.row { display: flex; gap: 18px; }
.cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.sq { width: 90px; height: 62px; background: #fff; border-radius: var(--radius-none); }
.lbl { font-family: var(--font-family-code); font-size: 11px; font-weight: 700; }
.val { font-family: var(--font-family-code); font-size: 10px; color: var(--color-neutral-550); text-align: center; line-height: 1.3; }
</style></head><body>
<div class="row">
  <div class="cell">
    <div class="sq" style="box-shadow: var(--elevation-sm);"></div>
    <div class="lbl">elevation-sm</div>
    <div class="val">Card default<br/>0 0 25 · 5%</div>
  </div>
  <div class="cell">
    <div class="sq" style="box-shadow: var(--elevation-md);"></div>
    <div class="lbl">elevation-md</div>
    <div class="val">Hover / sticky<br/>0 0 25 · 10%</div>
  </div>
  <div class="cell">
    <div class="sq" style="box-shadow: var(--elevation-lg);"></div>
    <div class="lbl">elevation-lg</div>
    <div class="val">Modal / popover<br/>0 0 25 · 15%</div>
  </div>
</div>
</body></html>
