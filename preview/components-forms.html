<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Meridian · Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body {
  margin: 0; background: #fff;
  padding: 18px 22px 20px;
  box-sizing: border-box;
  width: 700px;
  font-family: var(--font-family-text);
  color: var(--color-neutral-950);
}

/* ── Label ── */
.field-label {
  font-family: var(--font-family-utility);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);   /* 12px */
  line-height: var(--line-height-sm);
  letter-spacing: var(--letter-spacing-default);
  color: var(--color-neutral-950);
  margin-bottom: 4px;
}
.field-label .req { color: var(--color-neutral-550); }

/* ── Composite input shell ── */
.input-shell {
  display: flex;
  align-items: stretch;
  height: 40px;
  border: 1px solid var(--color-neutral-200);
  border-radius: var(--radius-flag); /* 0 = square */
  overflow: hidden;
  box-sizing: border-box;
  transition: border-color .15s;
}
.input-shell.state-focus    { border-color: var(--color-neutral-950); border-width: 2px; }
.input-shell.state-error    { border-color: var(--color-red-800);   border-width: 1px; }
.input-shell.state-success  { border-color: var(--color-green-900); border-width: 1px; }
.input-shell.state-disabled { border-color: var(--color-neutral-200); background: var(--color-neutral-100); }

/* ── Prefix slot (left) ── */
.input-prefix {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  background: var(--color-neutral-50);
  border-right: 1px solid var(--color-neutral-200);
  flex-shrink: 0;
  font-family: var(--font-family-utility);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  color: var(--color-neutral-950);
  white-space: nowrap;
}
.state-disabled .input-prefix { color: var(--color-neutral-400); }

.prefix-tag {
  background: var(--color-neutral-950);
  color: var(--color-neutral-0);
  font-size: 10px;
  font-weight: var(--font-weight-strong);
  padding: 2px 5px;
  letter-spacing: 0.03em;
}
.state-disabled .prefix-tag { background: var(--color-neutral-300); }

.prefix-stepper {
  display: flex;
  flex-direction: column;
  gap: 1px;
  opacity: 0.5;
}
.prefix-stepper span {
  display: block;
  width: 10px;
  height: 6px;
  line-height: 1;
  font-size: 8px;
  text-align: center;
  color: var(--color-neutral-700);
}

/* ── Main field slot (right) ── */
.input-field {
  display: flex;
  align-items: center;
  flex: 1;
  padding: 0 10px;
  gap: 8px;
  min-width: 0;
}
.input-field input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-family-text);
  font-size: var(--font-size-md);
  line-height: var(--line-height-md);
  color: var(--color-neutral-950);
  background: transparent;
  min-width: 0;
}
.input-field input::placeholder { color: var(--color-neutral-400); }
.input-field input:disabled { color: var(--color-neutral-400); cursor: not-allowed; }

.input-icon {
  width: 16px; height: 16px;
  border: 1px solid var(--color-neutral-300);
  border-radius: 2px;
  flex-shrink: 0;
}
.state-disabled .input-icon { border-color: var(--color-neutral-200); }

.input-chevron {
  flex-shrink: 0;
  width: 16px; height: 16px;
  color: var(--color-neutral-550);
}
.state-disabled .input-chevron { color: var(--color-neutral-300); }

/* ── Helper text ── */
.field-help {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
  font-family: var(--font-family-utility);
  font-size: var(--font-size-sm);
  line-height: var(--line-height-sm);
  color: var(--color-neutral-550);
}
.field-help.help-error   { color: var(--color-red-800); }
.field-help.help-success { color: var(--color-green-900); }
.help-icon { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Grid layout ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 16px;
  row-gap: 14px;
}
.col-head {
  font-family: var(--font-family-code);
  font-size: 9px;
  color: var(--color-neutral-450);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}

/* full-width disabled row */
.full { grid-column: 1 / -1; }
</style></head><body>

<div style="display: grid; grid-template-columns: repeat(3,1fr); column-gap: 16px; margin-bottom: 10px;">
  <div class="col-head">Default / Focus</div>
  <div class="col-head">Error</div>
  <div class="col-head">Success</div>
</div>

<div class="grid">

  <!-- Default -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" placeholder="Text">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Helper text
    </div>
  </div>

  <!-- Error -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell state-error">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" placeholder="Text">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help help-error">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      Helper text
    </div>
  </div>

  <!-- Success -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell state-success">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" placeholder="Text">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help help-success">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Helper text
    </div>
  </div>

  <!-- Focus -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell state-focus">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" value="Alma">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Helper text
    </div>
  </div>

  <!-- Error filled -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell state-error">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" value="Alma">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help help-error">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      Helper text
    </div>
  </div>

  <!-- Success filled -->
  <div>
    <div class="field-label">Label<span class="req">*</span></div>
    <div class="input-shell state-success">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" value="Alma">
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help help-success">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Helper text
    </div>
  </div>

  <!-- Disabled — full width -->
  <div class="full">
    <div class="field-label" style="color: var(--color-neutral-400);">Label<span class="req">*</span></div>
    <div class="input-shell state-disabled" style="width: calc(33% - 8px);">
      <div class="input-prefix">
        <span class="prefix-tag">FR</span>
        <span>🇫🇷</span>
        <div class="prefix-stepper"><span>▲</span><span>▼</span></div>
      </div>
      <div class="input-field">
        <div class="input-icon"></div>
        <input type="text" placeholder="Text" disabled>
        <svg class="input-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
    <div class="field-help" style="color: var(--color-neutral-300);">
      <svg class="help-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Helper text
    </div>
  </div>

</div>
</body></html>
